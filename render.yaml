services:
  - type: web
    name: vyaparsetu-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TOTP_ENCRYPTION_KEY
        generateValue: true
      - key: WEBAUTHN_RP_ID
        value: vyparsetu.vercel.app
      - key: WEBAUTHN_ORIGINS
        value: https://vyparsetu.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://vyparsetu.vercel.app
      - key: DEMO_LOGIN_ENABLED
        value: true
      - key: OAUTH_FRONTEND_URL
        value: https://vyparsetu.vercel.app
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        value: https://vyparsetu.onrender.com/api/v1/auth/oauth/google/callback
      - key: APPLE_OAUTH_CLIENT_ID
        sync: false
      - key: APPLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: APPLE_OAUTH_REDIRECT_URI
        value: https://vyparsetu.onrender.com/api/v1/auth/oauth/apple/callback
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DB_POOL_SIZE
        value: 5
      - key: STORAGE_PATH
        value: /tmp/vyaparsetu/storage
      - key: JAVA_TOOL_OPTIONS
        value: -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC
