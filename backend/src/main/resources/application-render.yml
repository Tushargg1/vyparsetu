spring:
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: 1
      connection-timeout: 30000
  flyway:
    connect-retries: 10
  jpa:
    hibernate:
      ddl-auto: none
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  forward-headers-strategy: framework
  shutdown: graceful
  compression:
    enabled: true
  error:
    include-message: never

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  features:
    demo-login:
      enabled: true
  storage:
    local-path: ${STORAGE_PATH:/tmp/vyaparsetu/storage}
